<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maverix Routine System</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 {
    color: #38bdf8;
}

.box {
    margin-top: 20px;
    padding: 20px;
    background: #1e293b;
    border-radius: 10px;
}

button {
    padding: 10px 20px;
    background: #38bdf8;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin-bottom: 20px;
}

.routine {
    text-align: left;
    max-width: 400px;
    margin: auto;
}

.item {
    padding: 10px;
    margin: 5px 0;
    border-radius: 6px;
    background: #334155;
}

.active {
    background: #22c55e;
    color: black;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>⚡ Maverix Routine System</h1>

<div class="box">
    <p>Activate your routine system</p>
    <button onclick="startSystem()">Start System</button>

    <div class="routine" id="routineList"></div>
</div>

<script>

const routine = [
    { start: "06:00", end: "07:40", task: "All Set - Get Ready" },
    { start: "07:40", end: "10:10", task: "Study" },
    { start: "10:10", end: "10:30", task: "Break" },
    { start: "10:30", end: "12:30", task: "Study" },
    { start: "12:30", end: "13:20", task: "Break" },
    { start: "13:20", end: "15:20", task: "Study" },
    { start: "15:20", end: "15:40", task: "Break" },
    { start: "15:40", end: "17:10", task: "Study" },
    { start: "17:10", end: "17:40", task: "Chill" },
    { start: "17:40", end: "19:10", task: "Study" },
    { start: "19:10", end: "19:40", task: "Dinner Break" },
    { start: "19:40", end: "20:40", task: "Study" },
    { start: "20:40", end: "21:00", task: "Break" },
    { start: "21:00", end: "22:00", task: "Study" },
    { start: "22:00", end: "23:00", task: "Relax & Prepare" },
    { start: "23:00", end: "23:59", task: "Sleep" }
];

function startSystem() {
    Notification.requestPermission().then(permission => {
        if (permission !== "granted") {
            alert("Enable notifications bro 😤");
            return;
        }

        alert("System Activated 🚀");

        renderRoutine();
        setInterval(updateActiveTask, 1000);
    });
}

function renderRoutine() {
    const container = document.getElementById("routineList");
    container.innerHTML = "";

    routine.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "item";
        div.id = "item-" + index;
        div.innerText = `${item.start} - ${item.end} → ${item.task}`;
        container.appendChild(div);
    });
}

function getMinutes(time) {
    let [h, m] = time.split(":").map(Number);
    return h * 60 + m;
}

function updateActiveTask() {
    const now = new Date();
    const current = now.getHours() * 60 + now.getMinutes();

    const currentTimeStr = now.getHours().toString().padStart(2,'0') + ":" +
                           now.getMinutes().toString().padStart(2,'0');

    routine.forEach((item, index) => {
        const start = getMinutes(item.start);
        const end = getMinutes(item.end);

        const element = document.getElementById("item-" + index);

        // Highlight active task
        if (current >= start && current < end) {
            element.classList.add("active");
        } else {
            element.classList.remove("active");
        }

        // Notification (FIXED VERSION)
        if (currentTimeStr === item.start) {
            if (!item.notified) {
                new Notification("⏰ Time Alert", {
                    body: item.task
                });
                item.notified = true;
            }
        }
    });
}

</script>

</body>
</html>
